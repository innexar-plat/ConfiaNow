services:
  postgres:
    image: postgres:16-alpine
    container_name: local-trust-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: local_trust_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: